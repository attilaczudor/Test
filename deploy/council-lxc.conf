# ──────────────────────────────────────────────────────────────
# Proxmox Config Template — Council Members (Tier 2 & 3)
#
# Tier 2 (Branch Coordinators) and Tier 3 (Specialists) run
# as LXC containers. Tier 1 (Director) runs as a full VM.
#
# Resources are auto-calculated from model size:
#   RAM  ≈ (params_B × 0.6 GB) + 1.5 GB overhead (Q4_K_M)
#   Cores: 2 for ≤2B, 4 for ≤8B, 6 for ≤15B, 8 for ≤35B
#   Disk ≈ (params_B × 0.55 GB) + 5 GB
#
# Example sizing:
#   tinyllama (1.1B)     : cores=2,  memory=2560,   disk=6
#   phi (3.8B)           : cores=4,  memory=4096,   disk=8
#   mistral (7B)         : cores=4,  memory=5632,   disk=9
#   solar (10.7B)        : cores=6,  memory=8192,   disk=11
#   deepseek-coder (33B) : cores=8,  memory=22016,  disk=24
#   codellama (34B)      : cores=8,  memory=22528,  disk=24
#   mixtral (47B, VM)    : cores=12, memory=32256,  disk=36
# ──────────────────────────────────────────────────────────────

# Container basics
arch: amd64
ostype: ubuntu
hostname: council-member

# Resources — auto-sized from model, see table above
cores: 4
memory: 8192
swap: 1024

# Storage — model weights + OS
rootfs: local-lvm:20

# Network
net0: name=eth0,bridge=vmbr0,ip=dhcp

# Security
unprivileged: 1
features: nesting=1

# Startup — Tier 2 coordinators start before Tier 3 specialists
# Tier 2: order=2,up=30
# Tier 3: order=3,up=45
onboot: 1
startup: order=3,up=45
